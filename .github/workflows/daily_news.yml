   name: Daily Hot News

   on:
     schedule:
       # 每天 00:00 UTC => 北京时间 08:00
       - cron: "0 0 * * *"
     workflow_dispatch: {}

   jobs:
     run-daily-news:
       runs-on: ubuntu-latest

       steps:
         - name: Checkout repo
           uses: actions/checkout@v4

         - name: Set up Python
           uses: actions/setup-python@v5
           with:
             python-version: "3.11"

         - name: Install dependencies
           run: |
             pip install --upgrade pip
             pip install -r requirements.txt

         - name: Run script
           env:
             DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
             DOUBAO_MODEL_ID: ${{ secrets.DOUBAO_MODEL_ID }}
             FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
           run: |
             python main.py
